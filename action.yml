name: 'Govis — Go Architecture Visualizer'
description: 'Generates architecture diagrams, dependency graphs, and analysis reports for Go codebases'
author: 'zopdev'
branding:
  icon: 'map'
  color: 'blue'
inputs:
  dir:
    description: 'The directory or packages to parse (e.g. ./...)'
    required: false
    default: './...'
  filter:
    description: 'Filter specific packages'
    required: false
    default: ''
runs:
  using: 'docker'
  image: 'Dockerfile'
